name: Update top scorers

on:
  schedule:
    # כל 2 שעות בחודשי הטורניר (יוני–יולי 2026)
    # 100 קריאות חינמיות ליום ÷ 12 קריאות = 8 קריאות ÷ 2h = מספיק
    - cron: '0 */2 * 6,7 *'
  workflow_dispatch:  # הפעלה ידנית

jobs:
  update-scorers:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Update top scorers
        run: node scripts/update-scorers.mjs
        env:
          SUPABASE_URL:         ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFOOTBALL_KEY:      ${{ secrets.APIFOOTBALL_KEY }}
